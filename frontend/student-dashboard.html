<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { content: ["./**/*.{html,js}"] };</script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Student Dashboard</h1>
      <button onclick="logout()" class="text-red-600 hover:underline">Logout</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Upload Form -->
      <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow">
        <h2 class="text-2xl font-semibold mb-6">Upload New Project</h2>
        <form id="uploadForm">
          <input type="text" id="title" placeholder="Project Title" class="w-full p-4 border rounded-2xl mb-4" required>
          <textarea id="description" placeholder="Description" rows="4" class="w-full p-4 border rounded-2xl mb-6"></textarea>

          <label class="block text-sm font-medium mb-2">Select Lecturer</label>
          <select id="lecturerId" class="w-full p-4 border rounded-2xl mb-6" required>
            <option value="">Loading lecturers...</option>
          </select>

          <input type="file" id="projectFile" accept="application/pdf" class="mb-6">
          <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-medium">Upload & Assign</button>
        </form>
      </div>

      <!-- My Projects -->
      <div class="bg-white p-6 rounded-3xl shadow">
        <h3 class="font-semibold mb-4">My Submissions</h3>
        <div id="myProjectsList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
