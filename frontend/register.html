<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ProjectRepo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { content: ["./**/*.{html,js}"] };</script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Create Account</h1>
    <form id="registerForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Full Name</label>
        <input type="text" id="name" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Role</label>
        <select id="role" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500">
          <option value="student">Student</option>
          <option value="lecturer">Lecturer</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold">Register</button>
    </form>
    <p class="text-center mt-6 text-sm">Already have an account? <a href="login.html" class="text-blue-600 hover:underline">Login</a></p>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
