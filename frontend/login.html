<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ProjectRepo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = { content: ["./**/*.{html,js}"] };
  </script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
    <div class="text-center mb-10">
      <i class="fas fa-book text-6xl text-blue-600 mb-4"></i>
      <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500 mt-2">Sign in to continue your work</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" id="email" class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" class="w-full px-5 py-4 border border-gray-200 rounded-2xl focus:outline-none focus:border-blue-500" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg transition">
        Sign In
      </button>
    </form>

    <p class="text-center mt-8 text-sm text-gray-600">
      Don't have an account? 
      <a href="register.html" class="text-blue-600 hover:underline font-medium">Create one</a>
    </p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
