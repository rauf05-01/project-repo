<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ProjectRepo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { content: ["./**/*.{html,js}"] };</script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Login</h1>
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:border-blue-500" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold">Login</button>
    </form>
    <p class="text-center mt-6 text-sm">Don't have an account? <a href="register.html" class="text-blue-600 hover:underline">Register here</a></p>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
