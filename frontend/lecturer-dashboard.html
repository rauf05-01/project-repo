<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Dashboard - ProjectRepo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = { content: ["./**/*.{html,js}"] };
  </script>
</head>
<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="bg-white shadow border-b">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="text-3xl">📘</div>
        <h1 class="text-2xl font-bold text-gray-900">ProjectRepo</h1>
      </div>
      <div class="flex items-center gap-8">
        <span class="text-gray-600 font-medium">Lecturer</span>
        <button onclick="logout()" class="flex items-center gap-2 text-red-600 hover:text-red-700 transition">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
      <i class="fas fa-tasks text-blue-600"></i>
      Projects Assigned to Me
    </h2>
    <div id="assignedProjectsList" class="grid md:grid-cols-2 gap-6"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/projects.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadAssignedProjects);
  </script>
</body>
</html>
